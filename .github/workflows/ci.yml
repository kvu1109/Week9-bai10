name: Java CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      #1 Thêm checkout
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          #Cố tình sửa java version
          #java-version: '11'
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package

